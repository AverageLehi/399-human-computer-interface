<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>em vs rem</title>
  <link rel="stylesheet" href="scalingfonts.css" />
</head>
<body>

  <h1>Comparing em vs rem</h1>

  <div class="box box-em">
    <h2>Box A (em-based)</h2>
    <p>This box uses <strong>em</strong> for font-size and padding.</p>

    <div class="nested">
      Nested text (em compounds here)
    </div>
  </div>

  <div class="box box-rem">
    <h2>Box B (rem-based)</h2>
    <p>This box uses <strong>rem</strong> for font-size and padding.</p>

    <div class="nested">
      Nested text (rem stays consistent)
    </div>
  </div>

</body>
</html>
